<div id="admin-view" class="app-view hidden-view w-full max-w-6xl mx-auto flex flex-col min-h-[calc(100vh-80px)]">

    <div class="flex justify-between items-center mb-6">
        <div>
            <h2 class="text-3xl font-bold text-gray-800">ระบบจัดการผู้ดูแล (Admin)</h2>
            <p class="text-gray-600">จัดการข้อมูลสมาชิกและสิทธิ์การใช้งาน</p>
        </div>
        <button onclick="loadAdminData()"
            class="bg-blue-100 text-blue-700 px-4 py-2.5 rounded-lg hover:bg-blue-200 transition shadow-sm font-bold flex items-center">
            <i class="fa-solid fa-rotate-right mr-2"></i> รีเฟรชข้อมูล
        </button>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">

        <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-blue-500 flex items-center">
            <div class="p-4 rounded-full bg-blue-100 text-blue-600 mr-4"><i class="fa-solid fa-users text-2xl"></i>
            </div>
            <div>
                <p class="text-sm text-gray-500 font-medium">สมาชิกทั้งหมด</p>
                <p class="text-3xl font-bold text-gray-800" id="stat-total">0</p>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-green-500 flex items-center">
            <div class="p-4 rounded-full bg-green-100 text-green-600 mr-4"><i
                    class="fa-solid fa-user-check text-2xl"></i></div>
            <div>
                <p class="text-sm text-gray-500 font-medium">ใช้งานปกติ</p>
                <p class="text-3xl font-bold text-gray-800" id="stat-active">0</p>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-red-500 flex items-center">
            <div class="p-4 rounded-full bg-red-100 text-red-600 mr-4"><i class="fa-solid fa-user-slash text-2xl"></i>
            </div>
            <div>
                <p class="text-sm text-gray-500 font-medium">ถูกระงับ (Banned)</p>
                <p class="text-3xl font-bold text-gray-800" id="stat-banned">0</p>
            </div>
        </div>

        <div onclick="openAdminProfileModal()"
            class="bg-gradient-to-br from-gray-700 to-gray-900 rounded-xl shadow-md p-6 flex items-center justify-between cursor-pointer hover:scale-105 transition-transform duration-200 text-white group">
            <div>
                <p class="text-sm font-medium text-gray-300">บัญชีของฉัน</p>
                <p class="text-xl font-bold group-hover:text-blue-300 transition-colors">จัดการโปรไฟล์</p>
            </div>
            <div class="p-4 rounded-full bg-white bg-opacity-20 text-white group-hover:bg-blue-500 transition-colors">
                <i class="fa-solid fa-user-gear text-2xl"></i>
            </div>
        </div>

    </div>

    <div class="bg-white rounded-xl shadow-md overflow-hidden flex-grow flex flex-col">
        <div class="bank-gradient px-6 py-4">
            <h3 class="text-lg font-bold text-white"><i class="fa-solid fa-list mr-2"></i>รายชื่อสมาชิกในระบบ</h3>
        </div>
        <div class="overflow-x-auto flex-grow">
            <table class="w-full text-left border-collapse min-w-full">
                <thead class="bg-gray-50 sticky top-0 shadow-sm z-10">
                    <tr class="text-gray-700 text-sm uppercase border-b border-gray-200">
                        <th class="px-6 py-4">ID / Username</th>
                        <th class="px-6 py-4">อีเมล</th>
                        <th class="px-6 py-4">สิทธิ์ (Role)</th>
                        <th class="px-6 py-4 text-center">สถานะ</th>
                        <th class="px-6 py-4 text-center">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="admin-user-table" class="text-gray-700 divide-y divide-gray-200">
                </tbody>
            </table>
        </div>
    </div>

</div>

<div id="admin-profile-modal"
    class="hidden fixed inset-0 bg-black bg-opacity-60 flex justify-center items-center z-50 backdrop-blur-sm transition-opacity">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl mx-4 overflow-hidden border-t-8 border-gray-800">
        <div class="bg-gray-100 px-6 py-4 flex justify-between items-center border-b border-gray-200">
            <h3 class="text-xl font-bold text-gray-800"><i
                    class="fa-solid fa-user-gear mr-2 text-gray-600"></i>จัดการข้อมูลส่วนตัว (Admin)</h3>
            <button onclick="closeAdminProfileModal()"
                class="text-gray-400 hover:text-red-500 text-2xl leading-none transition-colors">&times;</button>
        </div>

        <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6 bg-white">

            <form onsubmit="handleAdminUpdateEmail(event)"
                class="bg-gray-50 p-5 rounded-xl shadow-inner border border-gray-200">
                <h4 class="font-bold mb-4 text-gray-800 border-b border-gray-300 pb-2"><i
                        class="fa-solid fa-envelope mr-2 text-blue-600"></i>เปลี่ยนอีเมลรับ OTP</h4>
                <div class="mb-5">
                    <label class="block text-sm font-bold text-gray-700 mb-2">อีเมลใหม่</label>
                    <input type="email" id="admin-profile-email" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white shadow-sm">
                </div>
                <button type="submit"
                    class="w-full bg-blue-600 text-white font-bold py-2.5 px-4 rounded-lg hover:bg-blue-700 transition shadow-md">
                    บันทึกอีเมล
                </button>
            </form>

            <form onsubmit="handleAdminChangePassword(event)"
                class="bg-gray-50 p-5 rounded-xl shadow-inner border border-gray-200">
                <h4 class="font-bold mb-4 text-gray-800 border-b border-gray-300 pb-2"><i
                        class="fa-solid fa-lock mr-2 text-green-600"></i>เปลี่ยนรหัสผ่าน</h4>
                <div class="mb-4">
                    <label class="block text-sm font-bold text-gray-700 mb-2">รหัสผ่านเดิม</label>
                    <input type="password" id="admin-profile-old-pass" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 bg-white shadow-sm">
                </div>
                <div class="mb-5">
                    <label class="block text-sm font-bold text-gray-700 mb-2">รหัสผ่านใหม่</label>
                    <input type="password" id="admin-profile-new-pass" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 bg-white shadow-sm">
                </div>
                <button type="submit"
                    class="w-full bg-green-600 text-white font-bold py-2.5 px-4 rounded-lg hover:bg-green-700 transition shadow-md">
                    อัปเดตรหัสผ่าน
                </button>
            </form>

        </div>
    </div>
</div>

<script>
    // --- ฟังก์ชันเปิด/ปิด Modal หน้า Profile ---
    function openAdminProfileModal() {
        document.getElementById('admin-profile-modal').classList.remove('hidden');
        // ดึงอีเมลปัจจุบันมาแสดงในช่องกรอก
        if (currentUser) {
            document.getElementById('admin-profile-email').value = currentUser.email;
        }
    }

    function closeAdminProfileModal() {
        document.getElementById('admin-profile-modal').classList.add('hidden');
    }

    // ปิด Modal เมื่อคลิกพื้นที่ว่างข้างนอก
    document.getElementById('admin-profile-modal').addEventListener('click', function (e) {
        if (e.target === this) closeAdminProfileModal();
    });

    // --- ฟังก์ชันส่วนข้อมูลส่วนตัว (Profile) ---
    function handleAdminUpdateEmail(e) {
        e.preventDefault();
        const newEmail = document.getElementById('admin-profile-email').value;

        showLoading('กำลังอัปเดตอีเมล...');
        google.script.run.withSuccessHandler(res => {
            closeLoading();
            if (res.success) {
                currentUser.email = res.newEmail;
                localStorage.setItem('saknarin_session', JSON.stringify({ user: currentUser, token: currentToken }));
                Toast.fire({ icon: 'success', title: res.message });
                loadAdminData();
                closeAdminProfileModal();
            } else {
                if (res.message.includes('Session')) logout(); // ตก Session
                else Swal.fire({ icon: 'error', title: 'อัปเดตไม่สำเร็จ', text: res.message });
            }
        }).updateUserEmail(currentToken, newEmail);
    }

    function handleAdminChangePassword(e) {
        e.preventDefault();
        const oldPass = document.getElementById('admin-profile-old-pass').value;
        const newPass = document.getElementById('admin-profile-new-pass').value;

        showLoading('กำลังเปลี่ยนรหัสผ่าน...');
        google.script.run.withSuccessHandler(res => {
            closeLoading();
            if (res.success) {
                Swal.fire({ icon: 'success', title: 'สำเร็จ!', text: res.message });
                e.target.reset();
                closeAdminProfileModal();
            } else {
                if (res.message.includes('Session')) logout();
                else Swal.fire({ icon: 'error', title: 'ไม่สามารถเปลี่ยนได้', text: res.message });
            }
        }).changeUserPassword(currentToken, oldPass, newPass);
    }

    // --- ฟังก์ชันส่วนตารางจัดการระบบ ---
    function loadAdminData() {
        showLoading('กำลังโหลดข้อมูลระบบ...');
        google.script.run.withSuccessHandler(res => {
            closeLoading();
            if (res.success) {
                document.getElementById('stat-total').innerText = res.stats.total;
                document.getElementById('stat-active').innerText = res.stats.active;
                document.getElementById('stat-banned').innerText = res.stats.banned;
                renderUserTable(res.users);
            } else {
                if (res.message.includes('Session') || res.message.includes('Token')) logout();
            }
        }).getAdminDashboardData(currentToken);
    }

    function renderUserTable(users) {
        const tbody = document.getElementById('admin-user-table');
        tbody.innerHTML = '';

        users.forEach(user => {
            // ป้องกันไม่ให้ Admin เปลี่ยนสิทธิ์หรือแบนตัวเอง
            const isMe = user.username === currentUser.username;

            const roleSelect = `
        <select onchange="changeRole('${user.userId}', this.value)" ${isMe ? 'disabled' : ''} 
                class="border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white shadow-sm cursor-pointer ${isMe ? 'opacity-60 cursor-not-allowed' : ''}">
          <option value="Member" ${user.role === 'Member' ? 'selected' : ''}>Member</option>
          <option value="Staff" ${user.role === 'Staff' ? 'selected' : ''}>Staff</option>
          <option value="Admin" ${user.role === 'Admin' ? 'selected' : ''}>Admin</option>
        </select>
      `;

            const statusBadge = user.status === 'Active'
                ? `<span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold shadow-sm border border-green-200">Active</span>`
                : `<span class="bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-bold shadow-sm border border-red-200">Banned</span>`;

            const tr = document.createElement('tr');
            tr.className = "hover:bg-blue-50 transition-colors";

            const banBtnClass = user.status === 'Active' ? 'bg-red-500 hover:bg-red-600' : 'bg-gray-500 hover:bg-gray-600';
            const banBtnText = user.status === 'Active' ? '<i class="fa-solid fa-ban"></i> แบน' : '<i class="fa-solid fa-unlock"></i> ปลดแบน';

            tr.innerHTML = `
        <td class="px-6 py-4">
          <div class="font-bold text-gray-800">${user.username}</div>
          <div class="text-xs text-gray-500"><i class="fa-solid fa-id-badge mr-1"></i>${user.userId}</div>
        </td>
        <td class="px-6 py-4 text-sm text-gray-600">${user.email}</td>
        <td class="px-6 py-4">${roleSelect}</td>
        <td class="px-6 py-4 text-center">${statusBadge}</td>
        <td class="px-6 py-4 text-center">
          <button onclick="toggleBan('${user.userId}', '${user.status}')" ${isMe ? 'disabled' : ''}
                  class="text-white px-4 py-1.5 rounded-lg text-sm shadow transition ${banBtnClass} ${isMe ? 'opacity-30 cursor-not-allowed' : ''}">
            ${banBtnText}
          </button>
        </td>
      `;
            tbody.appendChild(tr);
        });
    }

    function changeRole(userId, newRole) {
        Swal.fire({
            title: 'ยืนยันการเปลี่ยนสิทธิ์?',
            text: `คุณต้องการเปลี่ยนสิทธิ์เป็น ${newRole} ใช่หรือไม่?`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'ยืนยัน',
            cancelButtonText: 'ยกเลิก',
            confirmButtonColor: '#3b82f6'
        }).then((result) => {
            if (result.isConfirmed) {
                showLoading('กำลังอัปเดต...');
                google.script.run.withSuccessHandler(res => {
                    closeLoading();
                    if (res.success) {
                        Toast.fire({ icon: 'success', title: res.message });
                    } else {
                        if (res.message.includes('Session')) logout();
                        else Swal.fire({ icon: 'error', title: 'ผิดพลาด', text: res.message });
                    }
                    loadAdminData();
                }).updateUserRole(currentToken, userId, newRole);
            } else {
                loadAdminData(); // รีเซ็ต select กลับเป็นค่าเดิมถ้ากดยกเลิก
            }
        });
    }

    function toggleBan(userId, currentStatus) {
        const actionText = currentStatus === 'Active' ? 'ระงับการใช้งาน (Ban)' : 'ปลดระงับ (Unban)';
        Swal.fire({
            title: `ยืนยันการ ${actionText}?`,
            text: "ผู้ใช้จะไม่สามารถเข้าสู่ระบบได้หากถูกระงับ",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: currentStatus === 'Active' ? '#ef4444' : '#10b981',
            confirmButtonText: 'ยืนยัน',
            cancelButtonText: 'ยกเลิก'
        }).then((result) => {
            if (result.isConfirmed) {
                showLoading('กำลังอัปเดตสถานะ...');
                google.script.run.withSuccessHandler(res => {
                    closeLoading();
                    if (res.success) {
                        Toast.fire({ icon: 'success', title: res.message });
                    } else {
                        if (res.message.includes('Session')) logout();
                        else Swal.fire({ icon: 'error', title: 'ผิดพลาด', text: res.message });
                    }
                    loadAdminData();
                }).toggleUserStatus(currentToken, userId, currentStatus);
            }
        });
    }
</script>
