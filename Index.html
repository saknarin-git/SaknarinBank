  <script>
    // ตัวแปรเก็บข้อมูล User และ Token ที่ล็อกอินแล้ว
    let currentUser = null;
    let currentToken = null;

    // ฟังก์ชันสลับหน้าต่าง (SPA Routing)
    function showView(viewId) {
      // ซ่อนทุกหน้าก่อน
      document.querySelectorAll('.app-view').forEach(el => el.classList.add('hidden-view'));
      // แสดงเฉพาะหน้าที่ต้องการ
      const targetView = document.getElementById(viewId);
      if (targetView) {
        targetView.classList.remove('hidden-view');
      }
    }

    // ฟังก์ชันสำหรับแจ้งเตือนมุมขวาบน (Toast)
    const Toast = Swal.mixin({
      toast: true,
      position: 'top-end',
      showConfirmButton: false,
      timer: 3000,
      timerProgressBar: true
    });

    // ฟังก์ชันแสดง Popup โหลดดิ้ง
    function showLoading(text = 'กำลังประมวลผล...') {
      Swal.fire({
        title: text,
        allowOutsideClick: false,
        didOpen: () => {
          Swal.showLoading();
        }
      });
    }

    // ฟังก์ชันปิด Popup โหลดดิ้ง
    function closeLoading() {
      Swal.close();
    }

    // HTML Escape Helper ป้องกัน XSS
    function escapeHtml(unsafe) {
      if (unsafe == null) return "";
      return String(unsafe)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>

        <h2 class="text-3xl font-bold text-gray-800 mb-2" id="welcome-msg">ยินดีต้อนรับเข้าสู่ระบบ</h2>
        <p class="text-gray-600">นี่คือพื้นที่ของสมาชิก (กำลังเตรียมการพัฒนาในขั้นตอนต่อไป...)</p>

  <script>
    let isProcessing = false;

    function safeText(element, text) {
      element.textContent = text;
      return element;
    }

    // เริ่มต้นแสดงหน้า Login เมื่อโหลดเว็บเสร็จ
    window.onload = () => {
      const savedSession = localStorage.getItem('saknarin_session');
      if (savedSession) {
        try {
          const sessionData = JSON.parse(savedSession);
          currentUser = sessionData.user;
          currentToken = sessionData.token;

          if (!currentUser || !currentToken) throw new Error("Invalid session format");

          google.script.run.withSuccessHandler(res => {
            if (res.success && res.data && res.data.valid) {
              currentUser = res.data.user || currentUser;
              localStorage.setItem('saknarin_session', JSON.stringify({ user: currentUser, token: currentToken }));

              document.getElementById('nav-user-info').classList.remove('hidden-view');
              document.getElementById('nav-username').innerText = escapeHtml(currentUser.username) + ' (' + escapeHtml(currentUser.role) + ')';
              routeUserBasedOnRole();
            } else {
              logout();
            }
          }).withFailureHandler(err => {
            logout();
          }).restoreSession(currentToken);

        } catch (e) {
          console.error('Session parse error:', e);
          localStorage.removeItem('saknarin_session');
          showView('login-view');
        }
      } else {
        showView('login-view');
      }
    };

    // ฟังก์ชันออกจากระบบ
    function logout() {
      currentUser = null;
      currentToken = null;
      localStorage.removeItem('saknarin_session');
      document.getElementById('nav-user-info').classList.add('hidden-view');

      if (typeof closePaymentMode === 'function') closePaymentMode();

      showView('login-view');
      Toast.fire({ icon: 'success', title: 'ออกจากระบบสำเร็จ' });
    }

    // ฟังก์ชันแยกเส้นทางผู้ใช้งานหลังล็อกอินสำเร็จ
    function routeUserBasedOnRole() {
      if (!currentUser) return;

      if (currentUser.role === 'Admin') {
        showView('admin-view');
        if (typeof loadAdminData === 'function') loadAdminData();
      } else if (currentUser.role === 'Staff') {
        showView('staff-view');
      } else {
        showView('member-view');
        document.getElementById('welcome-msg').innerText = `ยินดีต้อนรับคุณ ${currentUser.username}`;
        loadMemberDashboard();
      }
    }

    // --- ฟังก์ชันสำหรับ Member View (ใหม่) ---
    function loadMemberDashboard() {
      if (isProcessing) return;
      if (!currentToken) return logout();

      isProcessing = true;
      showLoading('กำลังโหลดข้อมูลสมาชิก...');
      google.script.run.withSuccessHandler(res => {
        closeLoading();
        isProcessing = false;
        if (res.success) {
          const view = document.getElementById('member-view');

          // 1. Create Static Shell Without Backend Data
          let shellHtml = `
                    <div class="bg-white rounded-xl shadow-lg border-t-8 border-blue-600 overflow-hidden mb-8">
                        <div class="p-8 text-center bg-blue-50">
                            <i class="fa-solid fa-user-circle text-6xl text-blue-600 mb-4"></i>
                            <h2 class="text-3xl font-bold text-gray-800" id="mem-dash-welcome"></h2>
                            <p class="text-gray-500" id="mem-dash-number"></p>
                        </div>
                        
                        <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="bg-gray-50 p-6 rounded-xl border border-gray-200">
                                <h3 class="font-bold text-lg mb-4 text-gray-700"><i class="fa-solid fa-file-contract mr-2"></i>ข้อมูลสัญญาเงินกู้</h3>
                                <div id="mem-dash-loans"></div>
                            </div>

                            <div class="bg-gray-50 p-6 rounded-xl border border-gray-200">
                                <h3 class="font-bold text-lg mb-4 text-gray-700"><i class="fa-solid fa-history mr-2"></i>ประวัติการชำระเงินล่าสุด</h3>
                                <div class="space-y-3" id="mem-dash-txs"></div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-blue-600 text-white p-6 rounded-xl shadow-md text-center">
                        <p class="font-bold mb-2">ต้องการความช่วยเหลือ?</p>
                        <p class="text-sm opacity-80 mb-4">หากพบข้อมูลผิดพลาดหรือต้องการสอบถามเพิ่มเติม กรุณาติดต่อเจ้าหน้าที่</p>
                        <button onclick="Swal.fire('ติดต่อเจ้าหน้าที่', 'กรุณาติดต่อเบอร์ 0XX-XXX-XXXX หรือเดินทางมาที่สำนักงาน', 'info')" class="bg-white text-blue-600 px-6 py-2 rounded-full font-bold shadow-sm hover:bg-gray-100 transition">ติดต่อเรา</button>
                    </div>
                `;
          view.innerHTML = shellHtml;

          // 2. Safely Populate Text
          document.getElementById('mem-dash-welcome').textContent = 'ยินดีต้อนรับคุณ ' + currentUser.username;
          document.getElementById('mem-dash-number').textContent = 'หมายเลขสมาชิก: ' + currentUser.username;

          // 3. Safely Render Loans
          const loansContainer = document.getElementById('mem-dash-loans');
          if (res.data.loans.length > 0) {
            res.data.loans.forEach(loan => {
              const div = document.createElement('div');
              div.className = \`bg-white p-4 rounded-lg shadow-sm mb-3 border-l-4 \${loan.status === 'Active' ? 'border-green-500' : 'border-gray-400'}\`;
                  
                  const headerDiv = document.createElement('div');
                  headerDiv.className = 'flex justify-between items-center mb-1';
                  const cNoSpan = document.createElement('span');
                  cNoSpan.className = 'text-sm font-bold text-gray-500';
                  cNoSpan.textContent = 'เลขที่สัญญา: ' + loan.contractNo;
                  const statSpan = document.createElement('span');
                  statSpan.className = \`text-xs px-2 py-0.5 rounded-full \${loan.status === 'Active' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-600'} font-bold\`;
                  statSpan.textContent = loan.status;
                  headerDiv.appendChild(cNoSpan); headerDiv.appendChild(statSpan);

                  const bodyDiv = document.createElement('div');
                  bodyDiv.className = 'flex justify-between items-end';
                  
                  const col1 = document.createElement('div');
                  const lbl1 = document.createElement('p'); lbl1.className = 'text-xs text-gray-400'; lbl1.textContent = 'วงเงินกู้';
                  const val1 = document.createElement('p'); val1.className = 'font-bold text-gray-700'; val1.textContent = Number(loan.loanAmount).toLocaleString() + '.-';
                  col1.appendChild(lbl1); col1.appendChild(val1);

                  const col2 = document.createElement('div');
                  col2.className = 'text-right';
                  const lbl2 = document.createElement('p'); lbl2.className = 'text-xs text-blue-500 font-bold'; lbl2.textContent = 'คงเหลือ';
                  const val2 = document.createElement('p'); val2.className = 'text-2xl font-bold text-blue-700'; val2.textContent = Number(loan.balance).toLocaleString() + '.-';
                  col2.appendChild(lbl2); col2.appendChild(val2);

                  bodyDiv.appendChild(col1); bodyDiv.appendChild(col2);
                  div.appendChild(headerDiv); div.appendChild(bodyDiv);
                  
                  loansContainer.appendChild(div);
              });
          } else {
              const p = document.createElement('p');
              p.className = 'text-gray-400 text-center py-4';
              p.textContent = '- ไม่มีข้อมูลสัญญา -';
              loansContainer.appendChild(p);
          }

          // 4. Safely Render Transactions
          const txsContainer = document.getElementById('mem-dash-txs');
          if (res.data.transactions.length > 0) {
              res.data.transactions.forEach(tx => {
                  const div = document.createElement('div');
                  div.className = 'flex justify-between items-center bg-white p-3 rounded-lg shadow-sm border border-gray-100';
                  
                  const left = document.createElement('div');
                  const d1 = document.createElement('p'); d1.className = 'text-xs text-gray-400'; d1.textContent = tx.date;
                  const d2 = document.createElement('p'); d2.className = 'text-sm font-bold text-gray-700'; d2.textContent = \`ชำระต้น: \${Number(tx.principal).toLocaleString()} ดอก: \${Number(tx.interest).toLocaleString()}\`;
                  left.appendChild(d1); left.appendChild(d2);

                  const right = document.createElement('div');
                  right.className = 'text-right';
                  const r1 = document.createElement('p'); r1.className = 'text-xs text-gray-400'; r1.textContent = 'คงเหลือ';
                  const r2 = document.createElement('p'); r2.className = 'text-sm font-bold text-green-600'; r2.textContent = Number(tx.balance).toLocaleString();
                  right.appendChild(r1); right.appendChild(r2);

                  div.appendChild(left); div.appendChild(right);
                  txsContainer.appendChild(div);
              });
          } else {
              const p = document.createElement('p');
              p.className = 'text-gray-400 text-center py-4';
              p.textContent = '- ไม่พบประวัติ -';
              txsContainer.appendChild(p);
          }

        } else {
          if (res.message && res.message.includes('Session')) logout();
        }
      }).withFailureHandler(err => {
        closeLoading();
        isProcessing = false;
        Swal.fire({ icon: 'error', title: 'ระบบผิดพลาด', text: err.message || 'ไม่สามารถติดต่อเซิร์ฟเวอร์' });
      }).getMemberLoanData(currentToken);
    }
  </script>
